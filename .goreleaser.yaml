version: 2

project_name: sdcd

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: sdcd
    main: ./cmd/sdcd
    binary: sdcd
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/suzutan/sdcd-cli/cmd.Version={{.Version}}
      - -X github.com/suzutan/sdcd-cli/cmd.Commit={{.Commit}}
      - -X github.com/suzutan/sdcd-cli/cmd.BuildDate={{.Date}}

archives:
  - id: sdcd
    name_template: >-
      {{ .ProjectName }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  use: github
  groups:
    - title: "New Features"
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: "Bug Fixes"
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: "Other Changes"
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^ci:"
      - "merge conflict"
      - "Merge pull request"
      - "Merge branch"

release:
  github:
    owner: suzutan
    name: sdcd-cli
  name_template: "v{{.Version}}"
  draft: false
  prerelease: auto

